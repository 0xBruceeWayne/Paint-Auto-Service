<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paint Auto Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #e02020;
      --red-dark: #a01010;
      --bg: #0d0d0d;
      --bg-card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --white: #ffffff;
      --silver: #c0c0c0;
      --gray: #888888;
      --font: 'Rajdhani', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: var(--font); overflow-x: hidden; }
    #navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5vw;
  height: 72px;
  background: transparent;
  transition: background 0.3s, backdrop-filter 0.3s;
}
#navbar.scrolled {
  background: rgba(13,13,13,0.92);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
}
.nav-logo img { height: 48px; object-fit: contain; }
.nav-links { list-style: none; display: flex; gap: 2.5rem; }
.nav-links a {
  color: var(--white);
  text-decoration: none;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  position: relative;
  padding-bottom: 4px;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 2px;
  background: var(--red);
  transition: width 0.25s ease;
}
.nav-links a:hover::after { width: 100%; }
@media (max-width: 640px) {
  .nav-links { display: none; }
}
  </style>
</head>
<body>
  <nav id="navbar">
  <a href="#hero" class="nav-logo">
    <img src="assets/logo.png" alt="Paint Auto Service" />
  </a>
  <ul class="nav-links">
    <li><a href="#hero">Acasă</a></li>
    <li><a href="#services">Servicii</a></li>
    <li><a href="#about">Despre</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" integrity="sha512-dLxUelApnYxpLt6K2iomGngnHO83iUvZytA3YjDUCjT0HDOHKXnVYdf3hU4JjM8uEhxf9nD1/ey98U3t2vZ0A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 40);
});
  </script>
</body>
</html>
