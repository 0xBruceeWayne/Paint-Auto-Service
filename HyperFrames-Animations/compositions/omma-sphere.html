<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omma Sphere — HyperFrames Composition</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }
  #stage {
    width: 1920px;
    height: 1080px;
    position: relative;
    overflow: hidden;
  }
  canvas#bg { position: absolute; inset: 0; }
  /* UI overlay — animates in/out over the sphere */
  .ui-frame {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 0 180px;
    pointer-events: none;
  }
  .eyebrow {
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,180,40,0.85);
    margin-bottom: 24px;
    opacity: 0;
  }
  .headline {
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    font-size: 96px;
    font-weight: 800;
    line-height: 0.95;
    color: #fff;
    opacity: 0;
    transform: translateY(60px);
  }
  .headline em {
    font-style: normal;
    background: linear-gradient(135deg, #ffa040 0%, #4488ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub {
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    margin-top: 32px;
    max-width: 480px;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(30px);
  }
  /* Liquid Glass pill — animates in last */
  .pill {
    margin-top: 56px;
    display: inline-flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(24px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 100px;
    padding: 16px 36px;
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
    opacity: 0; transform: translateY(20px);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.20),
      0 12px 40px rgba(0,30,120,0.40);
  }
  .pill-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ffa040;
    box-shadow: 0 0 12px rgba(255,160,64,0.8);
  }
  /* Vignette for cinematic depth */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 60% 50%,
      transparent 30%,
      rgba(0,0,0,0.60) 100%
    );
    pointer-events: none;
  }
</style>
</head>
<body>
<!-- HyperFrames composition root -->
<div id="stage"
  data-composition-id="omma-sphere"
  data-start="0"
  data-duration="12"
  data-width="1920"
  data-height="1080"
>
  <!-- Three.js canvas — full duration -->
  <canvas id="bg" width="1920" height="1080"
    data-clip-id="threejs-bg"
    data-start="0" data-duration="12" data-track-index="0"></canvas>

  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- UI overlay -->
  <div class="ui-frame">
    <div class="eyebrow">Premium Motion Design</div>
    <div class="headline">Beyond<br><em>Reality</em></div>
    <div class="sub">Scroll-based 3D animation that reacts to every pixel of movement.</div>
    <div class="pill">
      <span class="pill-dot"></span>
      Explore Now
    </div>
  </div>
</div>

<!-- Three.js + GSAP (CDN — same versions as website project) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
// ─── Three.js — Morphing Metallic Sphere ─────────────────────────────
(function () {
  const canvas = document.getElementById('bg');
  const W = 1920, H = 1080;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(65, W / H, 0.1, 200);
  camera.position.set(0, 0, 9);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setSize(W, H);
  renderer.setPixelRatio(1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;
  renderer.outputEncoding = THREE.sRGBEncoding;

  // Starfield
  const starGeo = new THREE.BufferGeometry();
  const sp = new Float32Array(1200 * 3);
  for (let i = 0; i < 1200; i++) {
    sp[i*3]   = (Math.random()-0.5)*200;
    sp[i*3+1] = (Math.random()-0.5)*200;
    sp[i*3+2] = (Math.random()-0.5)*200;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.20, transparent: true, opacity: 0.28,
    sizeAttenuation: true, depthWrite: false
  })));

  // Sphere
  const sphereGeo = new THREE.IcosahedronGeometry(3.8, 80);
  const origPos = sphereGeo.attributes.position.clone();

  const sphereMat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(0xc49520),
    metalness: 1.0,
    roughness: 0.07,
    clearcoat: 1.0,
    clearcoatRoughness: 0.04,
    iridescence: 1.0,
    iridescenceIOR: 1.9,
    iridescenceThicknessRange: [100, 400],
    envMapIntensity: 3.5,
  });

  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.position.set(5.5, 0, 0); // off-center — UI sits left, sphere right
  scene.add(sphere);

  // Lighting — motionsites.ai warm + cool signature
  const keyLight = new THREE.DirectionalLight(0xffa040, 6.0);
  keyLight.position.set(5, 7, 4);
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight(0x2244ff, 2.0);
  fillLight.position.set(-6, 0, -4);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0x00aaff, 1.0);
  rimLight.position.set(0, -5, 6);
  scene.add(rimLight);

  scene.add(new THREE.AmbientLight(0x080820, 1.0));

  // Hash-based 3D noise — no library needed
  function h(n) { return (Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1; }
  function noise3(x, y, z) {
    const ix=Math.floor(x), iy=Math.floor(y), iz=Math.floor(z);
    const fx=x-ix, fy=y-iy, fz=z-iz;
    const ux=fx*fx*(3-2*fx), uy=fy*fy*(3-2*fy), uz=fz*fz*(3-2*fz);
    const v=h; // alias
    const n000=v(ix+v(iy+v(iz))), n100=v(ix+1+v(iy+v(iz)));
    const n010=v(ix+v(iy+1+v(iz))), n110=v(ix+1+v(iy+1+v(iz)));
    const n001=v(ix+v(iy+v(iz+1))), n101=v(ix+1+v(iy+v(iz+1)));
    const n011=v(ix+v(iy+1+v(iz+1))), n111=v(ix+1+v(iy+1+v(iz+1)));
    return (n000*(1-ux)+n100*ux)*(1-uy)*(1-uz)
         + (n010*(1-ux)+n110*ux)*uy*(1-uz)
         + (n001*(1-ux)+n101*ux)*(1-uy)*uz
         + (n011*(1-ux)+n111*ux)*uy*uz;
  }

  const FREQ = 0.30, AMP = 0.14;
  function morphSphere(t) {
    const pos = sphereGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const ox=origPos.getX(i), oy=origPos.getY(i), oz=origPos.getZ(i);
      const n = (noise3(ox*FREQ+t*0.18, oy*FREQ+t*0.13, oz*FREQ+t*0.10) - 0.5)*2;
      const s = 1 + n * AMP;
      pos.setXYZ(i, ox*s, oy*s, oz*s);
    }
    pos.needsUpdate = true;
    sphereGeo.computeVertexNormals();
  }

  // Camera cinematic orbit state — GSAP will tween these
  const camState = { orbitX: 0, orbitY: 0, fov: 65 };

  // RAF loop
  let t0 = null;
  function tick(ts) {
    requestAnimationFrame(tick);
    if (t0 === null) t0 = ts;
    const t = (ts - t0) / 1000;

    morphSphere(t);

    sphere.rotation.y += 0.0020;
    sphere.rotation.x = Math.sin(t * 0.15) * 0.035;

    camera.position.x = camState.orbitX;
    camera.position.y = camState.orbitY;
    camera.fov = camState.fov;
    camera.updateProjectionMatrix();
    camera.lookAt(sphere.position);

    renderer.render(scene, camera);
  }
  requestAnimationFrame(tick);

  // Expose camState for GSAP timeline
  window._camState = camState;
  window._sphere = sphere;
  window._sphereMat = sphereMat;
})();

// ─── GSAP Timeline ────────────────────────────────────────────────────
// HyperFrames seeks this timeline frame-accurately during render.
const tl = gsap.timeline({ paused: true });
window.__hyperframes_timeline = tl; // required for HyperFrames seek

// T=0→1.5 : sphere floats in from right + UI elements enter
tl.fromTo(window._sphere && window._sphere.position,
  { x: 9, y: -2 },
  { x: 5.5, y: 0, duration: 1.8, ease: 'power3.out' },
  0
);
tl.fromTo(window._sphere && window._sphere.scale,
  { x: 0.3, y: 0.3, z: 0.3 },
  { x: 1, y: 1, z: 1, duration: 1.8, ease: 'elastic.out(1, 0.7)' },
  0
);

// eyebrow
tl.fromTo('.eyebrow',
  { opacity: 0, x: -30 },
  { opacity: 1, x: 0, duration: 0.6, ease: 'power3.out' },
  0.4
);
// headline
tl.fromTo('.headline',
  { opacity: 0, y: 60 },
  { opacity: 1, y: 0, duration: 0.9, ease: 'power4.out' },
  0.65
);
// sub
tl.fromTo('.sub',
  { opacity: 0, y: 30 },
  { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' },
  0.9
);
// pill
tl.fromTo('.pill',
  { opacity: 0, y: 20 },
  { opacity: 1, y: 0, duration: 0.6, ease: 'back.out(2)' },
  1.15
);

// T=3→8 : slow camera drift + sphere color shift (scroll simulation)
tl.to(window._camState, {
  orbitX: -1.2, orbitY: 0.8, fov: 60,
  duration: 5, ease: 'power1.inOut'
}, 3);
tl.to(window._sphereMat && window._sphereMat.color, {
  r: 0.15, g: 0.35, b: 0.95, // shift sphere to blue
  duration: 4, ease: 'power1.inOut'
}, 4);

// T=9→11: exit — elements fade out, sphere drifts away
tl.to(['.headline', '.sub', '.eyebrow', '.pill'],
  { opacity: 0, y: -40, duration: 0.7, ease: 'power2.in', stagger: 0.08 },
  9
);
tl.to(window._sphere && window._sphere.position,
  { x: 9, y: 2, duration: 1.5, ease: 'power2.in' },
  9.5
);

// Start playing (HyperFrames overrides with seek for render)
tl.play();
</script>
</body>
</html>
